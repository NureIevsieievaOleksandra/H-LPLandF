{% extends 'concierge/base.html' %}
{% block content %}
<div style="margin-bottom:15px">
    <h2>Приміщення</h2>
    <a href="{% url 'room_create' %}" class="btn btn-green">+ Додати приміщення</a>
</div>
<table>
    <tr><th>Назва</th><th>Місткість</th><th>Опис</th></tr>
    {% for room in rooms %}
    <tr>
        <td>{{ room.name }}</td>
        <td>{{ room.capacity }}</td>
        <td>{{ room.description }}</td>
    </tr>
    {% empty %}
    <tr><td colspan="3">Приміщень немає</td></tr>
    {% endfor %}
</table>
<br>
<a href="{% url 'visitor_list' %}" class="btn btn-blue">← Назад</a>
{% endblock %}
