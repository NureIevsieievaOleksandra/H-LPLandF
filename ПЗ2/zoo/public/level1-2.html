<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8">
  <title>Рівні 1 & 2 — JSON + fetch</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: sans-serif; background: #0f0f13; color: #e8e8f0; padding: 32px 20px; }

    h1 { text-align: center; color: #f0c040; margin-bottom: 8px; }
    p.subtitle { text-align: center; color: #6b6b85; font-size: 0.85rem; margin-bottom: 28px; }

    /* фільтр */
    .filters {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      max-width: 860px;
      margin: 0 auto 28px;
    }
    .filters input, .filters select {
      flex: 1;
      min-width: 180px;
      padding: 10px 14px;
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 8px;
      color: #e8e8f0;
      font-size: 0.95rem;
    }
    .filters input:focus, .filters select:focus {
      outline: none; border-color: #f0c040;
    }
    #count { color: #6b6b85; font-size: 0.82rem; align-self: center; }

    /* список <li>*/
    #animal-list {
      list-style: none;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 20px;
      max-width: 860px;
      margin: 0 auto;
    }
    #animal-list li {
      background: #18181f;
      border: 1px solid #2a2a35;
      border-radius: 12px;
      overflow: hidden;
      transition: transform .2s, border-color .2s;
    }
    #animal-list li:hover { transform: translateY(-4px); border-color: #f0c040; }

    #animal-list li img {
      width: 100%; height: 150px; object-fit: cover; display: block;
    }
    .animal-info { padding: 12px 14px; }
    .animal-name { font-weight: 600; font-size: 1rem; color: #e8e8f0; }
    .animal-meta { font-size: 0.8rem; color: #6b6b85; margin-top: 4px; }

    #error { color: #ff4d6d; text-align: center; margin-top: 20px; }
  </style>
</head>
<body>

<h1>Зоопарк — Рівні 1 & 2</h1>
<p class="subtitle">fetch() + JSON.parse() + фільтрація масиву</p>

<div class="filters">
  <input type="text"   id="search-inp"  placeholder="Пошук за назвою..." oninput="applyFilter()">
  <select id="type-select" onchange="applyFilter()">
    <option value="">Всі типи</option>
    <option value="Ссавець">Ссавець</option>
    <option value="Птах">Птах</option>
    <option value="Рептилія">Рептилія</option>
  </select>
  <span id="count"></span>
</div>

<ul id="animal-list">Завантаження...</ul>
<p id="error"></p>

<script>
  // fetch + JSON.parse
  let allAnimals = [];

  fetch('animals.json')
    .then(function(response) {
      return response.text();
    })
    .then(function(text) {
      allAnimals = JSON.parse(text);
      renderList(allAnimals);
    })
    .catch(function(err) {
      document.getElementById('error').textContent = 'Помилка: ' + err.message;
    });

  // список <li>
  function renderList(animals) {
    const list = document.getElementById('animal-list');
    document.getElementById('count').textContent =
      'Показано: ' + animals.length + ' з ' + allAnimals.length;

    if (animals.length === 0) {
      list.innerHTML = '<li style="grid-column:1/-1;text-align:center;color:#6b6b85;padding:40px">Нічого не знайдено</li>';
      return;
    }

    list.innerHTML = '';

    animals.forEach(function(animal) {
      const li = document.createElement('li');

      const img = document.createElement('img');
      img.src = animal.photo;
      img.alt = animal.name;

      const info = document.createElement('div');
      info.className = 'animal-info';

      const name = document.createElement('div');
      name.className = 'animal-name';
      name.textContent = animal.name;

      const meta = document.createElement('div');
      meta.className = 'animal-meta';
      meta.textContent = animal.type + ' · ' + animal.habitat;

      info.appendChild(name);
      info.appendChild(meta);
      li.appendChild(img);
      li.appendChild(info);
      list.appendChild(li);
    });
  }

  // фільтрація масиву
  function applyFilter() {
    const searchVal = document.getElementById('search-inp').value.toLowerCase();
    const typeVal   = document.getElementById('type-select').value;

    const filtered = allAnimals.filter(function(animal) {
      const matchName = animal.name.toLowerCase().includes(searchVal);
      const matchType = typeVal === '' || animal.type === typeVal;
      return matchName && matchType;
    });

    renderList(filtered);
  }
</script>
</body>
</html>
